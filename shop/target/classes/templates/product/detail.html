<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${product.name + ' — MUSISHOP'}">상품 상세 — MUSISHOP</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body th:data-logged-in="${session.loginEmail != null}">

<nav class="nav">
  <a href="/" class="nav-logo">MUSI<span>SHOP</span></a>
  <div class="nav-menu">
    <a href="/products?category=TOP">상의</a>
    <a href="/products?category=BOTTOM">하의</a>
    <a href="/products?category=OUTER">아우터</a>
    <a href="/products?category=SHOES">신발</a>
    <a href="/products?category=ACC">악세서리</a>
  </div>
  <div class="nav-right">
    <th:block th:if="${session.loginEmail == null}">
      <a href="/auth/login">로그인</a>
      <a href="/auth/register"><button class="btn-login-nav">회원가입</button></a>
    </th:block>
    <th:block th:if="${session.loginEmail != null}">
      <span style="color:#888;font-size:12px;" th:text="${session.loginEmail}"></span>
      <a href="/auth/logout" style="color:#888;">로그아웃</a>
      <a th:if="${session.loginRole == 'ADMIN'}" href="/admin" style="color:var(--accent);font-weight:700;">관리자</a>
    </th:block>
  </div>
</nav>

<div class="breadcrumb">
  <a href="/">홈</a><span>›</span>
  <a href="/products">상품</a><span>›</span>
  <span th:text="${product.name}"></span>
</div>

<div class="detail-layout">
  <!-- 이미지 -->
  <div class="detail-img">
    <img th:src="${product.imageUrl}" th:alt="${product.name}"
         onerror="this.src='https://picsum.photos/seed/err/600/750'">
  </div>

  <!-- 상세 정보 -->
  <div class="detail-info">
    <div class="detail-brand" th:text="${product.brand}"></div>
    <h1 class="detail-name" th:text="${product.name}"></h1>
    <div class="detail-price" th:text="${#numbers.formatInteger(product.price,3,'COMMA') + '원'}"></div>
    <hr class="detail-divider">
    <p class="detail-desc" th:text="${product.description}"></p>
    <div class="detail-stock">
      재고 <strong th:text="${product.stock + '개'}"></strong> 남음
    </div>

    <!-- 로그인 상태에 따라 버튼 분기 -->
    <th:block th:if="${session.loginEmail != null}">
      <a th:href="@{/products/{id}/buy(id=${product.id})}">
        <button class="btn-buy">바로 구매</button>
      </a>
      <button class="btn-cart" onclick="showToast('장바구니에 담겼습니다 🛍️')">장바구니 담기</button>
    </th:block>
    <th:block th:if="${session.loginEmail == null}">
      <a href="/auth/login?alert=login">
        <button class="btn-buy">로그인 후 구매하기</button>
      </a>
      <button class="btn-cart" data-login-required="true">장바구니 담기</button>
    </th:block>

    <div style="margin-top:20px;padding:16px;background:var(--gray-50);border-radius:2px;font-size:12px;color:var(--gray-600);line-height:1.8;">
      <strong style="color:var(--black);">배송 안내</strong><br>
      무료배송 · 오후 2시 이전 주문 당일 출고<br>
      교환/반품 7일 이내 무료
    </div>
  </div>
</div>

<!-- 최근 본 상품 -->
<div th:if="${recentProducts != null and recentProducts.size() > 1}" class="recent-section">
  <div class="section-header" style="margin-bottom:16px;">
    <h2 class="section-title" style="font-size:15px;">최근 본 상품</h2>
  </div>
  <div class="recent-scroll">
    <div th:each="p : ${recentProducts}" class="recent-item">
      <a th:href="@{/products/{id}(id=${p.id})}">
        <img class="recent-img" th:src="${p.imageUrl}" th:alt="${p.name}" onerror="this.src='https://picsum.photos/seed/default/130/163'">
        <div class="recent-brand" th:text="${p.brand}"></div>
        <div class="recent-name" th:text="${p.name}"></div>
        <div class="recent-price" th:text="${#numbers.formatInteger(p.price,3,'COMMA') + '원'}"></div>
      </a>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">MUSI<span>SHOP</span></div>
    <p>© 2025 MUSISHOP. All rights reserved.</p>
  </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
