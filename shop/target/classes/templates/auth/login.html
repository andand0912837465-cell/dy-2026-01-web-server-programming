<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — MUSISHOP</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">MUSI<span>SHOP</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-text">MUSI<span>SHOP</span></div>
    </div>

    <!-- 로그인 필요 알림 -->
    <div th:if="${showAlert}" class="alert-box">
      <p>🔒 로그인이 필요한 서비스입니다. 로그인 후 이용해주세요.</p>
    </div>

    <div class="auth-title">로그인</div>
    <p class="auth-sub">이메일로 간편하게 로그인하세요</p>

    <!-- 에러 메시지 -->
    <div th:if="${error}" class="alert-box">
      <p th:text="${error}"></p>
    </div>

    <form th:action="@{/auth/login}" method="post"
          th:object="${loginRequest}">
      <input type="hidden" name="redirectUri" th:value="${redirectUri}">

      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" th:field="*{email}"
               placeholder="email@example.com" autocomplete="email">
        <div class="form-error" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
      </div>

      <button type="submit" class="btn-submit">로그인</button>
    </form>

    <div class="auth-footer">
      아직 회원이 아니신가요? <a href="/auth/register">이메일로 가입하기</a>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
