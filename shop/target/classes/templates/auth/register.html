<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — MUSISHOP</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">MUSI<span>SHOP</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-text">MUSI<span>SHOP</span></div>
    </div>

    <div class="auth-title">회원가입</div>
    <p class="auth-sub">이메일 하나로 가입 완료! 빠르고 간편합니다.</p>

    <!-- 에러 메시지 -->
    <div th:if="${error}" class="alert-box">
      <p th:text="${error}"></p>
    </div>

    <form th:action="@{/auth/register}" method="post"
          th:object="${registerRequest}">

      <div class="form-group">
        <label class="form-label">이메일 <span style="color:var(--accent)">*</span></label>
        <input type="email" class="form-input" th:field="*{email}"
               placeholder="email@example.com" autocomplete="email">
        <div class="form-error" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
      </div>

      <div style="background:var(--gray-50);padding:14px;border-radius:2px;margin-bottom:16px;font-size:12px;color:var(--gray-600);line-height:1.8;">
        ✔ 이메일만 입력하면 바로 가입 완료<br>
        ✔ 별도 비밀번호 설정 불필요<br>
        ✔ 다음 방문 시 동일한 이메일로 로그인
      </div>

      <button type="submit" class="btn-submit">가입하고 쇼핑 시작하기</button>
    </form>

    <div class="auth-footer">
      이미 회원이신가요? <a href="/auth/login">로그인</a>
    </div>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
